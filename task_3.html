<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<link href='https://fonts.googleapis.com/css?family=Roboto&subset=latin,cyrillic-ext,latin-ext,cyrillic' rel='stylesheet' type='text/css'>
	</head>
	<style>
		body {
			font-family: 'Roboto', sans-serif;
		}

		.wrapper {
			width:1024px;
			margin: 0 auto;
		}
		
		#result {
			padding: 20px;
			border: 2px solid #ff0000;
			width: 200px;
			text-align: center;
			margin: 0 auto;
		}

	</style>
	
	<body>
		<div class="wrapper">
			<section class="text">
				<h2>Задание 3</h2>
				<p>
					Финишная прямая. Нужно написать метод массива, который оставляет в массиве только уникальные элементы.<br>
					arr.unic(); ['1', '2', '1', 'js', 'css', 'js'] --> ['1', '2', 'js', 'css'] ( ಥ ʖ̯ ಥ)
				</p>
				<p id="result"></p>
			</section>
		</div>
	</body>

	<script>
		var arr = {};
		
		function uniс() {
	  	var obj = {};
	  	var arr = this.data;

		  for (var i = 0; i < arr.length; i++) {
		    var str = arr[i];
		    obj[str] = true;
		  }

		  return Object.keys(obj); 
		};

		arr.data = ['1', '2', '1', 'js', 'css', 'js'] 
		arr.uniс = uniс;

		var result = document.querySelector('#result');
		result.innerHTML = "Результат: " + arr.uniс();
	 
	</script>
</html>
