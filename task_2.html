<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<link href='https://fonts.googleapis.com/css?family=Roboto&subset=latin,cyrillic-ext,latin-ext,cyrillic' rel='stylesheet' type='text/css'>
	</head>
	<style>
		body {
			font-family: 'Roboto', sans-serif;
		}

		.wrapper {
			width:1024px;
			margin: 0 auto;
		}

		.task {
			width: 100%;
		}

		canvas {
			display: block;
			width: 300px;
			height: 300px;
			margin: 0 auto;
			border: 2px solid red;
		}
	</style>
	
	<body>
		<div class="wrapper">
			<section class="text">
				<h2>Задание 2</h2>
				<p>
					Тут уже задача посложнее. Нужно нарисовать картинку border.png на canvas-е с сохранением пропорций и качества.<br>
					Размер canvas-а оставить неизменным (300х300).( ͡° ͜ʖ ͡°)
			</section>
			<section class="task task2">
				<canvas id='canvas'></canvas>
				<canvas id='canvas1'></canvas>
			</section>
		</div>
	</body>
	<script src="libs/pica/dist/pica.min.js"></script>
	<script>
		//Получаем canvas
		var canvas = document.querySelector('#canvas');
		var context = canvas.getContext('2d');

		var canvas_opt = document.querySelector('#canvas_opt');
		canvas_opt.style.height = "auto";

		//Получаем pica
		const pica = window.pica();

		//Загружаем изображение
		var image = new Image();
		image.src = 'img/border.png';

		//После загрузки изображения
		image.onload = function () {
			//коэфицент пропорциональности
			var scale = canvas.clientWidth / image.width; 

			//Обработка и вывод в canvas_opt, не удалось задать пропорции, пришлось выстраивать высоту canvas автоматически
			pica.resize(image, canvas_opt, {
				unsharpAmount: 100,
				unsharpRadius: 0.6,
				unsharpThreshold: 2,
				alpha: true
			});

			//Вывод в canvas без обработки
			context.drawImage(image, 0, 0, image.width * scale, image.height * scale);
		};
	</script>
</html>
