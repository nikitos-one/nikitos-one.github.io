<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<link href='https://fonts.googleapis.com/css?family=Roboto&subset=latin,cyrillic-ext,latin-ext,cyrillic' rel='stylesheet' type='text/css'>
	</head>
	<style>
		body {
			font-family: 'Roboto', sans-serif;
		}

		.wrapper {
			width:1024px;
			margin: 0 auto;
		}

		.task {
			width: 100%;
		}

		canvas {
			display: block;
			width: 300px;
			height: 300px;
			margin: 0 auto;
			border: 2px solid red;
		}
	</style>
	
	<body>
		<div class="wrapper">
			<section class="text">
				<h2>Задание 2</h2>
				<p>
					Тут уже задача посложнее. Нужно нарисовать картинку border.png на canvas-е с сохранением пропорций и качества.<br>
					Размер canvas-а оставить неизменным (300х300).( ͡° ͜ʖ ͡°)
			</section>
			<section class="task task2">
				<canvas id='canvas'></canvas>
				<canvas id='canvas1'></canvas>
			</section>
		</div>
	</body>
	<script src="libs/pica/dist/pica.min.js"></script>
	<script>
	//Прорисовка canvas без оптимизации
		var canvas = document.querySelector('#canvas');
		var context = canvas.getContext('2d');

		var image = new Image();
		image.src = 'img/border.png';

		var scale = canvas.clientWidth / image.width;
		image.onload = function () {
			context.scale(scale, scale);
			context.drawImage(image,0,0);
		};

	//Прорисовка canvas после оптимизации
		var canvas1 = document.querySelector('#canvas1');
		var prevCanvasHeight = canvas1.clientHeight;
		canvas1.clientHeight = 'auto';

		var img = new Image();
		img.src = 'img/border.png';
		 
		const pica = window.pica();

		pica.resize(img, canvas1, {
		  unsharpAmount: 100,
		  unsharpRadius: 0.6,
		  unsharpThreshold: 2,
		  alpha: true
		});

		canvas1.height = prevCanvasHeight;

	</script>
</html>
